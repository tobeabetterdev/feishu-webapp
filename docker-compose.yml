version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    environment:
      - VITE_API_URL=http://localhost:8000
    networks:
      - app-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PIP_INDEX_URL: https://pypi.tuna.tsinghua.edu.cn/simple
        PIP_TRUSTED_HOST: pypi.tuna.tsinghua.edu.cn
        PIP_FALLBACK_INDEX_URL: https://mirrors.aliyun.com/pypi/simple
        PIP_FALLBACK_TRUSTED_HOST: mirrors.aliyun.com
        PIP_LAST_RESORT_INDEX_URL: https://pypi.org/simple
        PIP_LAST_RESORT_TRUSTED_HOST: pypi.org
    ports:
      - "8000:8000"
    volumes:
      - ./backend/outputs:/app/outputs
    environment:
      - PYTHONUNBUFFERED=1
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
